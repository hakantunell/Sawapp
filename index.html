<!doctype html>
<html lang="sv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sawapp v1.1.0</title><link rel="stylesheet" href="styles.css"></head>
<body>
<header class="topbar"><div><h1>Sawapp</h1><p>Timmer- och sågverksplanering.</p></div><div class="version">v1.1.0</div></header>
<nav class="tabs">
<button class="tab active" data-tab="stockTab">Stock</button><button class="tab" data-tab="dimensionsTab">Dimensioner</button><button class="tab" data-tab="planTab">Sågplan</button><button class="tab" data-tab="bigTab">Storskärm</button><button class="tab" data-tab="settingsTab">Inställningar</button>
</nav>
<main class="tabLayout">
<section id="stockTab" class="tabPage active"><div class="twoCol">
<section class="panel"><h2>Stock</h2><p class="hint">Värden som mäts för varje stock.</p><div class="grid2">
<label>Diameter stöd 1 <input id="rootDiameter" type="number" value="320" step="1"><span>mm</span></label>
<label>Diameter stöd 2 <input id="topDiameter" type="number" value="300" step="1"><span>mm</span></label>
<label>Rotända, valfritt<input id="rootEndDiameter" type="number" value="" step="1" placeholder="valfritt"><span>mm, används för mer noggrann avsmalning</span></label>
<label>Toppända, valfritt<input id="topEndDiameter" type="number" value="" step="1" placeholder="valfritt"><span>mm, används för mer noggrann avsmalning</span></label>
<label>Stocklängd <input id="logLength" type="number" value="4500" step="10"><span>mm</span></label>
<label>Krokighet / snöravvikelse <input id="sweep" type="number" value="10" step="1"><span>mm</span></label>
<label>Barktjocklek <input id="bark" type="number" value="12" step="1"><span>mm</span></label>
</div></section>
<section class="panel"><h2>Beräkning</h2><div class="metrics metrics-compact"><div class="metric"><span>Designdiameter</span><strong id="designDiameter">–</strong></div><div class="metric"><span>Användbar diameter</span><strong id="usableDiameter">–</strong></div><div class="metric"><span>Utbyte</span><strong id="yieldPct">–</strong></div><div class="metric"><span>Sågad area</span><strong id="sawnArea">–</strong></div><div class="metric"><span>Stockvolym</span><strong id="logVolume">–</strong></div></div><table class="smallTable"><tbody id="calcDetails"></tbody></table></section>
</div></section>
<section id="dimensionsTab" class="tabPage"><section class="panel widePanel"><h2>Dimensioner</h2><div id="dimensionList"></div></section></section>
<section id="planTab" class="tabPage"><div class="twoCol planGrid"><section class="panel"><h2>Sågbild</h2><canvas id="sawCanvas" width="780" height="620"></canvas></section><section class="panel"><h2>Sågordning</h2><div id="sawOrder"></div></section></div></section>
<section id="bigTab" class="tabPage"></section>
<section id="settingsTab" class="tabPage"></section>
</main><footer>Alla mått i millimeter. Tum = mm / 25,4.</footer>
<script src="src/app.js"></script>
</body></html>
